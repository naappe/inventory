<!DOCTYPE html>
<html>
<head>
    <title>🛍️ Ewity Products</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 28px; color: #1a237e; margin-bottom: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; background: #e8f5e9; color: #2e7d32; }
        .status { padding: 15px 20px; margin: 15px 0 20px 0; border-radius: 10px; font-weight: 600; }
        .loading { background: #e3f2fd; color: #0d47a1; border-left: 4px solid #1976d2; }
        .success { background: #e8f5e9; color: #1b5e20; border-left: 4px solid #43a047; }
        .error { background: #ffebee; color: #b71c1c; border-left: 4px solid #e53935; }
        .stats { display: flex; gap: 15px; flex-wrap: wrap; margin: 15px 0; }
        .stat-box { background: #f8f9fa; padding: 12px 24px; border-radius: 10px; border: 1px solid #e9ecef; }
        .stat-box .number { font-size: 24px; font-weight: 700; color: #1a237e; }
        .stat-box .number.green { color: #2e7d32; }
        .stat-box .number.red { color: #c62828; }
        .stat-box .label { font-size: 12px; color: #666; }
        button { background: #1a237e; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; margin: 5px; }
        button:hover { background: #0d1445; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: white; border: 1px solid #e9ecef; border-radius: 12px; padding: 18px; transition: 0.2s; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        .product-card h3 { font-size: 16px; color: #1a237e; margin-bottom: 8px; }
        .product-card .sku { font-size: 12px; color: #999; background: #f5f5f5; padding: 2px 10px; border-radius: 12px; display: inline-block; margin-bottom: 8px; }
        .product-card .price { font-size: 22px; font-weight: 700; color: #1a237e; margin: 8px 0; }
        .product-card .stock { font-size: 13px; padding: 4px 12px; border-radius: 12px; display: inline-block; font-weight: 600; }
        .product-card .stock.in-stock { background: #e8f5e9; color: #2e7d32; }
        .product-card .stock.out-of-stock { background: #ffebee; color: #c62828; }
        .product-card .stock.low-stock { background: #fff3e0; color: #e65100; }
        .product-card .meta { font-size: 12px; color: #999; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; }
        .debug { background: #1a1a2e; color: #aed581; padding: 15px; margin: 25px 0 10px 0; border-radius: 10px; font-family: monospace; font-size: 12px; max-height: 300px; overflow: auto; }
        .debug .time { color: #78909c; }
        .debug .success { color: #81c784; }
        .debug .error { color: #ef5350; }
        .no-products { text-align: center; padding: 60px 20px; color: #999; }
        .no-products .icon { font-size: 48px; margin-bottom: 15px; }
        .fade-in { animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .info-box { background: #e8f5e9; padding: 15px; border-radius: 10px; margin: 10px 0; border-left: 4px solid #2e7d32; }
        .info-box code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>🛍️ Ewity Products</h1>
            <span class="badge">✅ API Connected</span>
        </div>
        <div style="font-size:13px;color:#999;">
            <span id="productCount">0</span> products
        </div>
    </div>

    <div class="info-box">
        <strong>✅ NEW TOKEN WORKING!</strong>
        <br>
        Token: <code>uat_ePlylTZjp1bXyVtbokTJf5F819k5</code>
    </div>

    <div id="status" class="status loading">🔄 Loading products...</div>

    <div id="stats" class="stats"></div>

    <button onclick="loadProducts()">🔄 Refresh</button>
    <button onclick="clearDebug()">🗑️ Clear Log</button>

    <div id="products">
        <div class="no-products">
            <div class="icon">⏳</div>
            <p>Loading products from Ewity API...</p>
        </div>
    </div>

    <div style="margin-top:20px;">
        <h3>📋 Debug Log</h3>
        <div class="debug" id="debugLog">[System] Initializing...</div>
    </div>
</div>

<script>
// ============================================================
// YOUR NEW API TOKEN
// ============================================================
const CONFIG = {
    token: 'uat_ePlylTZjp1bXyVtbokTJf5F819k5',
    apiUrl: 'https://app.ewitypos.com/api/v1/products/locations/all',
    platform: 'web',
    clientId: 'web-client'
};

// ============================================================
// DOM REFERENCES
// ============================================================
const statusEl = document.getElementById('status');
const statsEl = document.getElementById('stats');
const productsEl = document.getElementById('products');
const debugEl = document.getElementById('debugLog');
const productCount = document.getElementById('productCount');

// ============================================================
// DEBUG LOGGER
// ============================================================
function debug(msg, type = 'info') {
    const time = new Date().toLocaleTimeString();
    const colors = { info: 'info', success: 'success', error: 'error', warning: 'warning' };
    const className = colors[type] || 'info';
    debugEl.innerHTML += `<div><span class="time">[${time}]</span> <span class="${className}">${msg}</span></div>`;
    debugEl.scrollTop = debugEl.scrollHeight;
    console.log(msg);
}

function clearDebug() {
    debugEl.innerHTML = '[System] Log cleared';
    debug('Log cleared', 'info');
}

// ============================================================
// LOAD PRODUCTS
// ============================================================
async function loadProducts() {
    statusEl.className = 'status loading';
    statusEl.textContent = '🔄 Loading products from Ewity API...';
    
    productsEl.innerHTML = `
        <div class="no-products">
            <div class="icon">⏳</div>
            <p>Fetching products from Ewity API...</p>
        </div>
    `;
    statsEl.innerHTML = '';

    try {
        debug('🚀 Starting product load...', 'info');
        debug(`📌 New Token: ${CONFIG.token.substring(0, 20)}...`, 'info');
        debug(`📡 Fetching: ${CONFIG.apiUrl}`, 'info');

        // Try multiple endpoints
        const endpoints = [
            CONFIG.apiUrl,
            'https://app.ewitypos.com/api/v1/locations',
            'https://app.ewitypos.com/api/v1/products/categories',
            'https://app.ewitypos.com/api/v1/products/brands'
        ];

        let data = null;
        let usedEndpoint = '';

        for (const endpoint of endpoints) {
            try {
                const response = await fetch(endpoint, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${CONFIG.token}`,
                        'X-Ewity-Platform': CONFIG.platform,
                        'x-client': 'Web',
                        'x-pos-client-id': CONFIG.clientId,
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    data = await response.json();
                    usedEndpoint = endpoint;
                    debug(`✅ Success with: ${endpoint}`, 'success');
                    break;
                }
            } catch (e) {
                debug(`❌ Failed: ${endpoint}`, 'error');
            }
        }

        if (!data) {
            throw new Error('No data from any endpoint. Check token permissions.');
        }

        const products = data.data || data.products || data.items || [];

        if (products.length === 0) {
            statusEl.className = 'status warning';
            statusEl.textContent = '⚠️ No products found';
            productsEl.innerHTML = `
                <div class="no-products">
                    <div class="icon">🔍</div>
                    <p>No products found in your Ewity account.</p>
                </div>
            `;
            return;
        }

        // Stats
        const total = products.length;
        const inStock = products.filter(p => (p.count || p.stock || 0) > 0).length;
        const outOfStock = total - inStock;
        const totalPrice = products.reduce((sum, p) => sum + (p.default_sales_price_with_tax || 0), 0);
        const avgPrice = total > 0 ? totalPrice / total : 0;

        statsEl.innerHTML = `
            <div class="stat-box"><div class="number">${total}</div><div class="label">Total Products</div></div>
            <div class="stat-box"><div class="number green">${inStock}</div><div class="label">In Stock</div></div>
            <div class="stat-box"><div class="number red">${outOfStock}</div><div class="label">Out of Stock</div></div>
            <div class="stat-box"><div class="number" style="font-size:18px;">$${avgPrice.toFixed(2)}</div><div class="label">Avg Price</div></div>
        `;

        statusEl.className = 'status success';
        statusEl.textContent = `✅ Loaded ${total} products successfully!`;
        productCount.textContent = total;

        // Render products
        productsEl.innerHTML = `
            <div class="product-grid fade-in">
                ${products.slice(0, 50).map(p => {
                    const name = p.name || 'Unnamed';
                    const sku = p.variants?.[0]?.sku || p.sku || 'N/A';
                    const price = p.default_sales_price_with_tax || p.sales_price_with_tax || 0;
                    const stock = p.count || p.stock || 0;
                    const brand = p.brand_name || p.brand || '';
                    const category = p.category_name || p.category || '';

                    let stockClass = 'out-of-stock';
                    let stockText = 'Out of Stock';
                    if (stock > 20) { stockClass = 'in-stock'; stockText = 'In Stock'; }
                    else if (stock > 0 && stock <= 10) { stockClass = 'low-stock'; stockText = `⚠️ ${stock} left`; }
                    else if (stock > 0) { stockClass = 'in-stock'; stockText = `${stock} left`; }

                    return `
                        <div class="product-card">
                            <h3>${name}</h3>
                            <span class="sku">SKU: ${sku}</span>
                            ${brand ? `<div style="font-size:12px;color:#666;margin:2px 0;">🏷️ ${brand}</div>` : ''}
                            ${category ? `<div style="font-size:12px;color:#666;margin-bottom:5px;">📂 ${category}</div>` : ''}
                            <div class="price">$${Number(price).toFixed(2)}</div>
                            <span class="stock ${stockClass}">${stockText}</span>
                            <div class="meta">
                                <span>ID: ${p.id || 'N/A'}</span>
                                <span>${p.is_inventory_tracked ? '📊 Tracked' : '📊 Not tracked'}</span>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
            ${products.length > 50 ? `<p style="text-align:center;margin-top:20px;color:#999;font-size:13px;">Showing 50 of ${products.length} products</p>` : ''}
        `;

        debug(`✅ Successfully loaded ${total} products!`, 'success');

    } catch (error) {
        debug(`❌ Error: ${error.message}`, 'error');

        statusEl.className = 'status error';
        statusEl.textContent = `❌ Error: ${error.message}`;

        productsEl.innerHTML = `
            <div style="background:#ffebee;padding:20px;border-radius:10px;border-left:4px solid #c62828;">
                <h3 style="color:#c62828;">❌ Failed to Load Products</h3>
                <p><strong>Error:</strong> ${error.message}</p>
                <p><strong>Check:</strong></p>
                <ul>
                    <li>Make sure the API user has <strong>"Read Product"</strong> permission</li>
                    <li>Click <strong>"Manage Levels"</strong> to check permissions</li>
                    <li>Your token is: <code>${CONFIG.token}</code></li>
                </ul>
                <button onclick="loadProducts()" style="margin-top:15px;padding:12px 24px;background:#1a237e;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;">
                    🔄 Try Again
                </button>
            </div>
        `;
        statsEl.innerHTML = '';
    }
}

// ============================================================
// INITIALIZE
// ============================================================
function init() {
    debug('🚀 Page loaded', 'info');
    debug(`📌 NEW Token: ${CONFIG.token.substring(0, 20)}...`, 'info');
    debug(`📌 API: ${CONFIG.apiUrl}`, 'info');
    debug('📌 Loading products...', 'info');
    setTimeout(loadProducts, 1000);
}

// ============================================================
// EXPOSE FUNCTIONS
// ============================================================
window.loadProducts = loadProducts;
window.clearDebug = clearDebug;

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>

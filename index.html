<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>StockFlow ERP - Modern Inventory Management</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Authentication Modal -->
  <div id="authModal" class="modal active">
    <div class="modal-content glass-card">
      <div class="auth-container">
        <div class="auth-header">
          <h2>Stock<span>Flow</span></h2>
          <p>Enterprise Inventory Management</p>
        </div>
        
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
          <button class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</button>
        </div>
        
        <!-- Login Form -->
        <div id="loginForm" class="auth-form active">
          <div class="form-group">
            <label>Email / Staff ID</label>
            <input type="text" id="loginEmail" class="form-control" placeholder="Enter your email or staff ID">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password">
          </div>
          <button class="btn btn-primary btn-full" onclick="handleLogin()">Login</button>
          <div class="demo-creds">
            <p>Demo Accounts:</p>
            <small>Admin: admin@stockflow.com / admin123</small>
            <small>Staff: staff@stockflow.com / staff123</small>
          </div>
        </div>
        
        <!-- Sign Up Form -->
        <div id="signupForm" class="auth-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signupName" class="form-control" placeholder="Enter your full name">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="signupEmail" class="form-control" placeholder="Enter your email">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" class="form-control" placeholder="Create a password">
          </div>
          <div class="form-group">
            <label>Role</label>
            <select id="signupRole" class="form-control">
              <option value="staff">Staff</option>
              <option value="admin">Admin (Requires approval)</option>
            </select>
          </div>
          <button class="btn btn-primary btn-full" onclick="handleSignup()">Create Account</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app-container hidden">
    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav">
      <button class="mobile-nav-item" data-nav="dashboard">
        <i class="fas fa-chart-line"></i>
        <span>Dashboard</span>
      </button>
      <button class="mobile-nav-item" data-nav="inventory">
        <i class="fas fa-boxes"></i>
        <span>Inventory</span>
      </button>
      <button class="mobile-nav-item" data-nav="stockin">
        <i class="fas fa-arrow-down"></i>
        <span>Stock IN</span>
      </button>
      <button class="mobile-nav-item" data-nav="stockout">
        <i class="fas fa-arrow-up"></i>
        <span>Stock OUT</span>
      </button>
      <button class="mobile-nav-item" data-nav="ledger">
        <i class="fas fa-history"></i>
        <span>Ledger</span>
      </button>
      <button class="mobile-nav-item" data-nav="settings">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
      </button>
    </nav>

    <!-- Desktop Sidebar -->
    <aside class="sidebar glass-card">
      <div class="sidebar-header">
        <h2>Stock<span>Flow</span></h2>
        <p>ERP System</p>
      </div>
      
      <div class="user-info" id="userInfo">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-details">
          <h4 id="userName">Administrator</h4>
          <p id="userRole">Admin</p>
        </div>
      </div>
      
      <nav class="sidebar-nav">
        <button class="nav-item active" data-nav="dashboard">
          <i class="fas fa-chart-line"></i> Dashboard
        </button>
        <button class="nav-item" data-nav="inventory">
          <i class="fas fa-boxes"></i> Inventory
        </button>
        <button class="nav-item" data-nav="stockin">
          <i class="fas fa-arrow-down"></i> Stock IN
        </button>
        <button class="nav-item" data-nav="stockout">
          <i class="fas fa-arrow-up"></i> Stock OUT
        </button>
        <button class="nav-item" data-nav="ledger">
          <i class="fas fa-history"></i> Ledger
        </button>
        <button class="nav-item" data-nav="settings">
          <i class="fas fa-cog"></i> Settings
        </button>
      </nav>
      
      <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar">
        <div class="page-header">
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle">Welcome back, here's your inventory overview</p>
        </div>
        <div class="header-actions">
          <button id="themeToggle" class="icon-btn">
            <i class="fas fa-moon"></i>
          </button>
          <div class="date-badge" id="currentDateTime"></div>
        </div>
      </div>
      
      <div id="viewContainer"></div>
    </main>
  </div>

  <!-- Stock IN Modal -->
  <div id="stockInModal" class="modal hidden">
    <div class="modal-content glass-card">
      <div class="modal-header">
        <h3><i class="fas fa-arrow-down"></i> Stock IN</h3>
        <button class="modal-close" onclick="closeStockInModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Item Name *</label>
          <select id="stockInItem" class="form-control">
            <option value="">Select Item</option>
          </select>
        </div>
        <div class="form-group">
          <label>Quantity *</label>
          <input type="number" id="stockInQty" class="form-control" step="any" min="0.01" placeholder="Enter quantity">
        </div>
        <div class="form-group">
          <label>Unit</label>
          <select id="stockInUnit" class="form-control">
            <option value="PCS">PCS</option>
            <option value="KG">KG</option>
            <option value="G">G</option>
            <option value="L">L</option>
            <option value="BOX">BOX</option>
          </select>
        </div>
        <div class="form-group">
          <label>Cost per Unit ($)</label>
          <input type="number" id="stockInCost" class="form-control" step="0.01" placeholder="Optional">
        </div>
        <div class="form-group">
          <label>Expiry Date</label>
          <input type="date" id="stockInExpiry" class="form-control">
        </div>
        <div class="form-group">
          <label>Reference Note</label>
          <input type="text" id="stockInNote" class="form-control" placeholder="Supplier info, invoice #, etc.">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeStockInModal()">Cancel</button>
        <button class="btn btn-primary" onclick="processStockIn()">Add Stock</button>
      </div>
    </div>
  </div>

  <!-- Stock OUT Modal -->
  <div id="stockOutModal" class="modal hidden">
    <div class="modal-content glass-card">
      <div class="modal-header">
        <h3><i class="fas fa-arrow-up"></i> Stock OUT</h3>
        <button class="modal-close" onclick="closeStockOutModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Item Name *</label>
          <select id="stockOutItem" class="form-control" onchange="updateStockOutInfo()">
            <option value="">Select Item</option>
          </select>
        </div>
        <div class="current-stock-info" id="currentStockInfo"></div>
        <div class="form-group">
          <label>Quantity *</label>
          <input type="number" id="stockOutQty" class="form-control" step="any" min="0.01" placeholder="Enter quantity">
        </div>
        <div class="form-group">
          <label>Reason *</label>
          <select id="stockOutReason" class="form-control">
            <option value="Sold">Sold</option>
            <option value="Damaged">Damaged</option>
            <option value="Kitchen">Kitchen Use</option>
            <option value="Transfer">Transfer</option>
          </select>
        </div>
        <div class="form-group">
          <label>Reference Note</label>
          <input type="text" id="stockOutNote" class="form-control" placeholder="Order #, customer, etc.">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeStockOutModal()">Cancel</button>
        <button class="btn btn-danger" onclick="processStockOut()">Remove Stock</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

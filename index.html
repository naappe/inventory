<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🛍️ Ewity Products - Working</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
        .header h1 { font-size: 28px; color: #1a237e; }
        .badge { padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; }
        .badge.success { background: #e8f5e9; color: #2e7d32; }
        .badge.error { background: #ffebee; color: #c62828; }
        .badge.warning { background: #fff3e0; color: #e65100; }
        .badge.loading { background: #e3f2fd; color: #0d47a1; }
        .status { padding: 15px 20px; margin: 15px 0 20px; border-radius: 10px; font-weight: 600; }
        .status.loading { background: #e3f2fd; color: #0d47a1; border-left: 4px solid #1976d2; }
        .status.success { background: #e8f5e9; color: #1b5e20; border-left: 4px solid #43a047; }
        .status.error { background: #ffebee; color: #b71c1c; border-left: 4px solid #e53935; }
        .status .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #e3f2fd; border-top: 3px solid #1976d2; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stats { display: flex; gap: 15px; margin: 15px 0 20px; flex-wrap: wrap; }
        .stat-box { background: #f8f9fa; padding: 12px 24px; border-radius: 10px; border: 1px solid #e9ecef; min-width: 100px; }
        .stat-box .number { font-size: 24px; font-weight: 700; color: #1a237e; }
        .stat-box .number.green { color: #2e7d32; }
        .stat-box .number.red { color: #c62828; }
        .stat-box .label { font-size: 12px; color: #666; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0 20px; }
        .controls button { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .controls button.primary { background: #1a237e; color: #fff; }
        .controls button.primary:hover { background: #0d1445; }
        .controls button.success-btn { background: #e8f5e9; color: #2e7d32; }
        .controls button.success-btn:hover { background: #c8e6c9; }
        .controls button.danger { background: #ffebee; color: #c62828; }
        .controls button.danger:hover { background: #ffcdd2; }
        .controls button.info-btn { background: #e3f2fd; color: #0d47a1; }
        .controls button.info-btn:hover { background: #bbdefb; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: #fff; border: 1px solid #e9ecef; border-radius: 12px; padding: 18px; transition: all 0.2s; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); border-color: #1a237e; }
        .product-card h3 { font-size: 16px; color: #1a237e; margin-bottom: 8px; }
        .product-card .sku { font-size: 12px; color: #999; background: #f5f5f5; padding: 2px 10px; border-radius: 12px; display: inline-block; margin-bottom: 8px; }
        .product-card .price { font-size: 22px; font-weight: 700; color: #1a237e; margin: 8px 0; }
        .product-card .stock { font-size: 13px; padding: 4px 12px; border-radius: 12px; display: inline-block; font-weight: 600; }
        .product-card .stock.in-stock { background: #e8f5e9; color: #2e7d32; }
        .product-card .stock.low-stock { background: #fff3e0; color: #e65100; }
        .product-card .stock.out-of-stock { background: #ffebee; color: #c62828; }
        .product-card .meta { font-size: 12px; color: #999; margin-top: 12px; padding-top: 10px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state .icon { font-size: 48px; margin-bottom: 15px; }
        .info-box { background: #e8f5e9; padding: 20px; border-radius: 10px; margin: 15px 0; border-left: 4px solid #2e7d32; }
        .info-box code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-size: 13px; word-break: break-all; }
        .debug-section { margin-top: 25px; }
        .debug-section .debug-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .debug-section .debug-header h3 { font-size: 14px; color: #333; }
        .debug-log { background: #1a1a2e; color: #aed581; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; max-height: 350px; overflow: auto; white-space: pre-wrap; line-height: 1.6; }
        .debug-log .time { color: #78909c; }
        .debug-log .info { color: #4fc3f7; }
        .debug-log .success { color: #81c784; }
        .debug-log .error { color: #ef5350; }
        .debug-log .warning { color: #ffb74d; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .error-box { background: #ffebee; padding: 20px; border-radius: 10px; border-left: 4px solid #c62828; margin: 16px 0; }
        .error-box h3 { color: #c62828; margin-bottom: 8px; }
        .error-box ul { margin: 8px 0 8px 20px; color: #555; }
        .error-box details { margin-top: 12px; }
        .error-box details summary { cursor: pointer; color: #1a237e; font-weight: 600; }
        .error-box pre { background: #f5f5f5; padding: 12px; border-radius: 6px; overflow: auto; font-size: 12px; margin-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>🛍️ Ewity Products</h1>
            <span class="badge loading" id="statusBadge">Loading...</span>
        </div>
        <div class="product-count">
            <span id="productCount">0</span> products
        </div>
    </div>

    <div class="info-box" id="infoBox">
        <strong>🔑 Token:</strong> <code id="tokenDisplay">Loading...</code>
        <br />
        <strong>📌 Status:</strong> <span id="statusMessage">Ready</span>
        <br />
        <strong>🌐 Worker:</strong> <span id="workerDisplay">throbbing-rice-035e</span>
    </div>

    <div id="status" class="status loading">
        <span class="spinner"></span>
        Click a button below to start
    </div>

    <div id="stats" class="stats"></div>

    <div class="controls">
        <button class="primary" onclick="fetchProducts()">🚀 Fetch Products</button>
        <button class="info-btn" onclick="testPlatforms()">🔍 Test Platforms</button>
        <button class="success-btn" onclick="loadMockData()">📦 Mock Data</button>
        <button class="danger" onclick="clearDebug()">🗑️ Clear Log</button>
    </div>

    <div id="products">
        <div class="empty-state">
            <div class="icon">👆</div>
            <p>Click "Test Platforms" to find the correct Platform ID.</p>
        </div>
    </div>

    <div class="debug-section">
        <div class="debug-header">
            <h3>📋 Debug Log</h3>
            <small id="debugStatus">Ready</small>
        </div>
        <div class="debug-log" id="debugLog">[System] Initializing...</div>
    </div>
</div>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const CONFIG = {
    token: 'uat_LFV9hqUG0YsXMbmNKZhcJip8KV75',
    workerUrl: 'https://throbbing-rice-035e.naappe.workers.dev',
    platform: 'web',
    clientId: 'web-client'
};

// ============================================================
// MOCK DATA
// ============================================================
const MOCK_PRODUCTS = [
    { id: 1, name: 'Ice cream soda', sku: 'ICS-001', price: 25.00, stock: 24, brand: '', category: 'Beverages' },
    { id: 2, name: 'Beef Sandwich', sku: 'BFS-002', price: 55.00, stock: -1, brand: '', category: 'Food' },
    { id: 3, name: 'Pepsi', sku: 'PEP-003', price: 25.00, stock: 23, brand: 'Pepsi', category: 'Beverages' },
    { id: 4, name: '7up', sku: 'SEV-004', price: 25.00, stock: 22, brand: '7up', category: 'Beverages' },
    { id: 5, name: 'Cappuccino', sku: 'CAP-005', price: 55.00, stock: -2, brand: '', category: 'Beverages' },
    { id: 6, name: 'Beef noodle soup', sku: 'BNS-006', price: 50.00, stock: -1, brand: '', category: 'Food' },
    { id: 7, name: 'Grill tuna (single)', sku: 'GTU-007', price: 45.00, stock: 0, brand: '', category: 'Food' },
    { id: 8, name: 'Chicken hot spicy burger', sku: 'CHB-008', price: 75.00, stock: 0, brand: '', category: 'Food' },
    { id: 9, name: 'Pesto pasta', sku: 'PES-009', price: 80.00, stock: 0, brand: '', category: 'Food' }
];

// ============================================================
// DOM REFS
// ============================================================
const statusEl = document.getElementById('status');
const statsEl = document.getElementById('stats');
const productsEl = document.getElementById('products');
const debugEl = document.getElementById('debugLog');
const statusBadge = document.getElementById('statusBadge');
const productCountEl = document.getElementById('productCount');
const tokenDisplay = document.getElementById('tokenDisplay');
const statusMessage = document.getElementById('statusMessage');
const debugStatus = document.getElementById('debugStatus');
const infoBox = document.getElementById('infoBox');

// ============================================================
// DEBUG
// ============================================================
function debug(msg, type = 'info') {
    const time = new Date().toLocaleTimeString();
    const colors = { info: 'info', success: 'success', error: 'error', warning: 'warning' };
    const cls = colors[type] || 'info';
    debugEl.innerHTML += `<div><span class="time">[${time}]</span> <span class="${cls}">${msg}</span></div>`;
    debugEl.scrollTop = debugEl.scrollHeight;
    console.log(msg);
}

function clearDebug() {
    debugEl.innerHTML = '[System] Log cleared';
    debug('Log cleared', 'info');
}

// ============================================================
// DISPLAY PRODUCTS
// ============================================================
function displayProducts(products, source) {
    if (!products || products.length === 0) {
        productsEl.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No products found.</p></div>';
        return;
    }

    const total = products.length;
    const inStock = products.filter(p => (p.count || p.stock || 0) > 0).length;
    const outOfStock = total - inStock;
    const totalPrice = products.reduce((sum, p) => sum + (p.default_sales_price_with_tax || p.price || 0), 0);
    const avgPrice = total > 0 ? totalPrice / total : 0;

    statsEl.innerHTML = `
        <div class="stat-box"><div class="number">${total}</div><div class="label">Total Products</div></div>
        <div class="stat-box"><div class="number green">${inStock}</div><div class="label">In Stock</div></div>
        <div class="stat-box"><div class="number red">${outOfStock}</div><div class="label">Out of Stock</div></div>
        <div class="stat-box"><div class="number" style="font-size:18px;">$${avgPrice.toFixed(2)}</div><div class="label">Avg Price</div></div>
        <div class="stat-box"><div class="number" style="font-size:14px;">${source}</div><div class="label">Source</div></div>
    `;

    statusEl.className = 'status success';
    statusEl.innerHTML = `✅ Loaded ${total} products from ${source}!`;
    statusBadge.textContent = `${total} Products`;
    statusBadge.className = 'badge success';
    productCountEl.textContent = total;
    statusMessage.textContent = `✅ ${total} products from ${source}`;
    infoBox.className = 'info-box';
    debugStatus.textContent = `✅ ${total} products loaded`;

    productsEl.innerHTML = `
        <div class="product-grid fade-in">
            ${products.map(p => {
                const name = p.name || 'Unnamed';
                const sku = p.variants?.[0]?.sku || p.sku || 'N/A';
                const price = p.default_sales_price_with_tax || p.sales_price_with_tax || p.price || 0;
                const stock = p.count || p.stock || 0;
                const brand = p.brand_name || p.brand || '';
                const category = p.category_name || p.category || '';

                let stockClass = 'out-of-stock';
                let stockText = 'Out of Stock';
                if (stock > 20) { stockClass = 'in-stock'; stockText = 'In Stock'; }
                else if (stock > 0 && stock <= 5) { stockClass = 'low-stock'; stockText = `⚠️ ${stock} left`; }
                else if (stock > 0) { stockClass = 'in-stock'; stockText = `${stock} left`; }
                else if (stock < 0) { stockClass = 'out-of-stock'; stockText = `${Math.abs(stock)} sold`; }

                return `
                    <div class="product-card">
                        <h3>${name}</h3>
                        <span class="sku">SKU: ${sku}</span>
                        ${brand ? `<div style="font-size:12px;color:#666;">🏷️ ${brand}</div>` : ''}
                        ${category ? `<div style="font-size:12px;color:#666;margin-bottom:5px;">📂 ${category}</div>` : ''}
                        <div class="price">$${Number(price).toFixed(2)}</div>
                        <span class="stock ${stockClass}">${stockText}</span>
                        <div class="meta">
                            <span>ID: ${p.id || 'N/A'}</span>
                        </div>
                    </div>
                `;
            }).join('')}
        </div>
    `;
}

// ============================================================
// LOAD MOCK DATA
// ============================================================
function loadMockData() {
    debug('📦 Loading mock data...', 'info');
    displayProducts(MOCK_PRODUCTS, 'Mock Data');
    debugStatus.textContent = 'Using Mock Data';
    infoBox.className = 'info-box';
}

// ============================================================
// TEST PLATFORMS
// ============================================================
async function testPlatforms() {
    debug('🔍 Starting platform test...', 'info');
    const platforms = ['web', 'pos', 'ecom', 'admin', 'mobile', 'web-client', 'naappe', 'api', 'pos-api', 'ewity', 'platform', 'client', 'app'];
    const results = [];
    
    statusEl.className = 'status loading';
    statusEl.innerHTML = '<span class="spinner"></span> Testing platforms...';
    statusMessage.textContent = '🔄 Testing platforms...';
    productsEl.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Testing all platform IDs...</p></div>';
    
    for (const platform of platforms) {
        try {
            const url = CONFIG.workerUrl + '?path=ecom-v1/locations&platform=' + platform;
            debug(`📡 Testing: ${platform}`, 'info');
            
            const response = await fetch(url, {
                headers: {
                    'Authorization': 'Bearer ' + CONFIG.token,
                    'X-Ewity-Platform': platform
                }
            });
            
            let result = '❌ ' + response.status;
            let isSuccess = false;
            
            try {
                const text = await response.text();
                if (text.includes('data') || text.includes('locations') || text.includes('success')) {
                    result = '✅ SUCCESS!';
                    isSuccess = true;
                    debug(`✅ Platform "${platform}" works!`, 'success');
                } else if (text.includes('401')) {
                    result = '❌ 401 - Invalid Platform';
                } else if (text.includes('403')) {
                    result = '❌ 403 - Forbidden';
                } else if (text.includes('404')) {
                    result = '❌ 404 - Not Found';
                }
            } catch (e) {
                result = '⚠️ Error';
            }
            
            results.push({ platform, status: response.status, result, isSuccess });
            
        } catch (e) {
            debug(`❌ Platform "${platform}" error: ${e.message}`, 'error');
            results.push({ platform, status: 'Error', result: '⚠️ ' + e.message, isSuccess: false });
        }
    }
    
    // Show results
    let html = '<div style="background:#f5f5f5;padding:20px;border-radius:10px;margin-top:20px;">';
    html += '<h3>🔍 Platform Test Results</h3>';
    html += '<table style="width:100%;border-collapse:collapse;margin-top:10px;">';
    html += '<tr style="background:#e9ecef;"><th style="padding:8px;text-align:left;">Platform</th><th style="padding:8px;text-align:left;">Status</th><th style="padding:8px;text-align:left;">Result</th></tr>';
    
    let found = false;
    for (const r of results) {
        const color = r.isSuccess ? 'green' : r.result.includes('401') ? 'orange' : 'red';
        if (r.isSuccess) found = true;
        html += `<tr><td style="padding:8px;border-bottom:1px solid #ddd;"><code>${r.platform}</code></td><td style="padding:8px;border-bottom:1px solid #ddd;">${r.status}</td><td style="padding:8px;border-bottom:1px solid #ddd;color:${color};">${r.result}</td></tr>`;
    }
    html += '</table>';
    
    if (found) {
        html += '<p style="margin-top:10px;color:#2e7d32;font-weight:bold;">✅ Found working platform! Copy it and click "Fetch Products"</p>';
    } else {
        html += '<p style="margin-top:10px;color:#c62828;font-weight:bold;">❌ No working platform found. Check your Ewity dashboard for the Platform ID.</p>';
    }
    html += '</div>';
    
    productsEl.innerHTML = html;
    statusEl.className = 'status info';
    statusEl.innerHTML = '🔍 Platform test completed. Check results above.';
    debugStatus.textContent = 'Platform test done';
}

// ============================================================
// FETCH PRODUCTS
// ============================================================
async function fetchProducts() {
    statusEl.className = 'status loading';
    statusEl.innerHTML = '<span class="spinner"></span> Fetching products...';
    statusBadge.textContent = 'Loading...';
    statusBadge.className = 'badge loading';
    statusMessage.textContent = '🔄 Fetching...';
    debugStatus.textContent = 'Fetching...';
    
    productsEl.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Fetching products...</p></div>';
    statsEl.innerHTML = '';

    try {
        const endpoints = ['ecom-v1/locations', 'ecom-v1/locations/1/categories', 'v1/locations'];
        let foundProducts = null;
        let workingEndpoint = '';
        let workingPlatform = CONFIG.platform;

        for (const endpoint of endpoints) {
            const url = CONFIG.workerUrl + '?path=' + endpoint + '&platform=' + workingPlatform;
            debug(`📡 Trying: ${endpoint} with platform ${workingPlatform}`, 'info');
            
            const response = await fetch(url, {
                headers: {
                    'Authorization': 'Bearer ' + CONFIG.token,
                    'X-Ewity-Platform': workingPlatform
                }
            });

            if (response.ok) {
                const data = await response.json();
                const products = data.data || data.products || data.items || [];
                if (products.length > 0) {
                    foundProducts = products;
                    workingEndpoint = endpoint;
                    debug(`✅ Found ${products.length} products at ${endpoint}`, 'success');
                    break;
                }
            }
        }

        if (foundProducts && foundProducts.length > 0) {
            displayProducts(foundProducts, 'Ewity API (' + workingEndpoint + ')');
        } else {
            debug('⚠️ No products found. Click "Test Platforms" first.', 'warning');
            statusEl.className = 'status warning';
            statusEl.innerHTML = '⚠️ Click "Test Platforms" first to find the right Platform ID';
            statusMessage.textContent = '⚠️ Need Platform ID';
            productsEl.innerHTML = `
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    <p>No products found. Click <strong>"Test Platforms"</strong> first to find the correct Platform ID.</p>
                </div>
            `;
        }

    } catch (error) {
        debug('❌ Error: ' + error.message, 'error');
        statusEl.className = 'status error';
        statusEl.innerHTML = '❌ Error: ' + error.message;
        statusMessage.textContent = '❌ ' + error.message;
        debugStatus.textContent = '❌ Error';
        
        productsEl.innerHTML = `
            <div class="error-box fade-in">
                <h3>❌ Failed to Fetch Products</h3>
                <p><strong>${error.message}</strong></p>
                <p><strong>Try:</strong></p>
                <ul>
                    <li>Click <strong>"Test Platforms"</strong> to find the correct Platform ID</li>
                    <li>Enable ALL E-commerce permissions in Company Admin</li>
                </ul>
                <details>
                    <summary style="cursor:pointer;font-weight:bold;color:#1a237e;">🔍 Debug</summary>
                    <pre>Token: ${CONFIG.token}\nWorker URL: ${CONFIG.workerUrl}\nError: ${error.stack || error.message}</pre>
                </details>
            </div>
        `;
        statsEl.innerHTML = '';
    }
}

// ============================================================
// INIT
// ============================================================
function init() {
    tokenDisplay.textContent = CONFIG.token;
    debug('🚀 Page loaded', 'info');
    debug('📌 Token: ' + CONFIG.token.substring(0, 20) + '...', 'info');
    debug('📌 Worker: ' + CONFIG.workerUrl, 'info');
    debug('📌 Click "Test Platforms" to find the correct Platform ID', 'info');
    statusMessage.textContent = 'Click "Test Platforms" to start';
    debugStatus.textContent = 'Ready';
    
    // Check if buttons work
    console.log('Buttons are ready! Click "Test Platforms" or "Fetch Products"');
}

// ============================================================
// EXPOSE
// ============================================================
window.fetchProducts = fetchProducts;
window.testPlatforms = testPlatforms;
window.loadMockData = loadMockData;
window.clearDebug = clearDebug;

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>

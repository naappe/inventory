<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ Ewity Products - Full Working Code</title>
    <style>
        /* ----------------------------------------------
           RESET & BASE STYLES
        ------------------------------------------------ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        /* ----------------------------------------------
           HEADER
        ------------------------------------------------ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 28px;
            color: #1a237e;
        }
        .badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .badge.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .badge.error {
            background: #ffebee;
            color: #c62828;
        }
        .badge.warning {
            background: #fff3e0;
            color: #e65100;
        }
        .badge.loading {
            background: #e3f2fd;
            color: #0d47a1;
        }
        .badge.info {
            background: #e3f2fd;
            color: #0d47a1;
        }
        .product-count {
            font-size: 14px;
            color: #777;
        }

        /* ----------------------------------------------
           STATUS
        ------------------------------------------------ */
        .status {
            padding: 15px 20px;
            margin: 15px 0 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status.loading {
            background: #e3f2fd;
            color: #0d47a1;
            border-left: 4px solid #1976d2;
        }
        .status.success {
            background: #e8f5e9;
            color: #1b5e20;
            border-left: 4px solid #43a047;
        }
        .status.error {
            background: #ffebee;
            color: #b71c1c;
            border-left: 4px solid #e53935;
        }
        .status.warning {
            background: #fff3e0;
            color: #e65100;
            border-left: 4px solid #fb8c00;
        }
        .status .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e3f2fd;
            border-top: 3px solid #1976d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ----------------------------------------------
           STATS
        ------------------------------------------------ */
        .stats {
            display: flex;
            gap: 15px;
            margin: 15px 0 20px;
            flex-wrap: wrap;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 12px 24px;
            border-radius: 10px;
            border: 1px solid #e9ecef;
            min-width: 100px;
        }
        .stat-box .number {
            font-size: 24px;
            font-weight: 700;
            color: #1a237e;
        }
        .stat-box .number.green { color: #2e7d32; }
        .stat-box .number.red { color: #c62828; }
        .stat-box .number.orange { color: #e65100; }
        .stat-box .label {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        /* ----------------------------------------------
           CONTROLS
        ------------------------------------------------ */
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0 20px;
        }
        .controls button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .controls button.primary {
            background: #1a237e;
            color: #fff;
        }
        .controls button.primary:hover {
            background: #0d1445;
            transform: translateY(-1px);
        }
        .controls button.secondary {
            background: #e8eaf6;
            color: #1a237e;
        }
        .controls button.secondary:hover {
            background: #c5cae9;
        }
        .controls button.danger {
            background: #ffebee;
            color: #c62828;
        }
        .controls button.danger:hover {
            background: #ffcdd2;
        }
        .controls button.success-btn {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .controls button.success-btn:hover {
            background: #c8e6c9;
        }

        /* ----------------------------------------------
           PRODUCT GRID
        ------------------------------------------------ */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .product-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 18px;
            transition: all 0.2s;
            position: relative;
        }
        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            border-color: #1a237e;
        }
        .product-card h3 {
            font-size: 16px;
            color: #1a237e;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        .product-card .sku {
            font-size: 12px;
            color: #999;
            background: #f5f5f5;
            padding: 2px 10px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .product-card .brand {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        .product-card .category {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }
        .product-card .price {
            font-size: 22px;
            font-weight: 700;
            color: #1a237e;
            margin: 8px 0;
        }
        .product-card .stock {
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
            font-weight: 600;
        }
        .product-card .stock.in-stock {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .product-card .stock.low-stock {
            background: #fff3e0;
            color: #e65100;
        }
        .product-card .stock.out-of-stock {
            background: #ffebee;
            color: #c62828;
        }
        .product-card .meta {
            font-size: 12px;
            color: #999;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
        }
        .product-card .variant-badge {
            font-size: 11px;
            background: #e8eaf6;
            color: #1a237e;
            padding: 2px 10px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 5px;
        }

        /* ----------------------------------------------
           EMPTY STATE / ERROR
        ------------------------------------------------ */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .error-container {
            background: #ffebee;
            padding: 25px;
            border-radius: 12px;
            border-left: 4px solid #c62828;
            margin: 20px 0;
        }
        .error-container h3 {
            color: #c62828;
            margin-bottom: 10px;
        }
        .error-container ul {
            margin: 10px 0 10px 20px;
            color: #555;
        }
        .error-container details {
            margin-top: 15px;
        }
        .error-container details summary {
            cursor: pointer;
            color: #1a237e;
            font-weight: 600;
        }
        .error-container pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            overflow: auto;
            font-size: 12px;
            margin-top: 10px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* ----------------------------------------------
           DEBUG LOG
        ------------------------------------------------ */
        .debug-section {
            margin-top: 25px;
        }
        .debug-section .debug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .debug-section .debug-header h3 {
            font-size: 14px;
            color: #333;
        }
        .debug-section .debug-header small {
            font-size: 12px;
            color: #999;
        }
        .debug-log {
            background: #1a1a2e;
            color: #aed581;
            padding: 15px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 350px;
            overflow: auto;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .debug-log .time { color: #78909c; }
        .debug-log .info { color: #4fc3f7; }
        .debug-log .success { color: #81c784; }
        .debug-log .error { color: #ef5350; }
        .debug-log .warning { color: #ffb74d; }
        .debug-log .data { color: #ce93d8; }

        /* ----------------------------------------------
           TOKEN INFO
        ------------------------------------------------ */
        .token-info {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0 15px;
            border-left: 4px solid #2e7d32;
        }
        .token-info code {
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            word-break: break-all;
        }

        /* ----------------------------------------------
           RESPONSIVE
        ------------------------------------------------ */
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .product-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 22px; }
            .stats { gap: 8px; }
            .stat-box { padding: 8px 16px; }
            .stat-box .number { font-size: 18px; }
            .controls button { padding: 8px 16px; font-size: 13px; }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ============================================================
    HEADER
    ============================================================ -->
    <div class="header">
        <div>
            <h1>🛍️ Ewity Products</h1>
            <span class="badge loading" id="statusBadge">Loading...</span>
        </div>
        <div class="product-count">
            <span id="productCount">0</span> products
        </div>
    </div>

    <!-- ============================================================
    TOKEN INFO
    ============================================================ -->
    <div class="token-info" id="tokenInfo">
        <strong>🔑 Token:</strong>
        <code id="tokenDisplay">Loading...</code>
        <br>
        <small>✅ Using your Ewity API token</small>
    </div>

    <!-- ============================================================
    STATUS
    ============================================================ -->
    <div id="status" class="status loading">
        <span class="spinner"></span>
        Loading products from Ewity API...
    </div>

    <!-- ============================================================
    STATS
    ============================================================ -->
    <div id="stats" class="stats"></div>

    <!-- ============================================================
    CONTROLS
    ============================================================ -->
    <div class="controls">
        <button class="primary" onclick="loadProducts()">🔄 Refresh</button>
        <button class="success-btn" onclick="loadMockData()">📦 Load Mock Data</button>
        <button class="secondary" onclick="switchEndpoint()">🔀 Switch Endpoint</button>
        <button class="danger" onclick="clearDebug()">🗑️ Clear Log</button>
    </div>

    <!-- ============================================================
    PRODUCTS
    ============================================================ -->
    <div id="products">
        <div class="empty-state">
            <div class="icon">⏳</div>
            <p>Loading products from Ewity API...</p>
        </div>
    </div>

    <!-- ============================================================
    DEBUG LOG
    ============================================================ -->
    <div class="debug-section">
        <div class="debug-header">
            <h3>📋 Debug Log</h3>
            <small id="endpointDisplay">Endpoint: /v1/products/locations/all</small>
        </div>
        <div class="debug-log" id="debugLog">[System] Initializing...</div>
    </div>
</div>

<script>
// ============================================================
// 1. CONFIGURATION
// ============================================================
const CONFIG = {
    // YOUR TOKEN HERE
    token: 'uat_ePlylTZjp1bXyVtbokTJf5F819k5',
    baseUrl: 'https://app.ewitypos.com/api/v1',
    platform: 'web',
    clientId: 'web-client',
    currentEndpoint: 0,
    endpoints: [
        { name: 'All Products', url: '/products/locations/all' },
        { name: 'Locations', url: '/locations' },
        { name: 'Categories', url: '/products/categories' },
        { name: 'Brands', url: '/products/brands' }
    ]
};

// ============================================================
// 2. MOCK DATA (Fallback)
// ============================================================
const MOCK_PRODUCTS = [
    { id: 1, name: 'Organic Coffee Beans', sku: 'COF-001', price: 24.99, stock: 45, brand: 'Mountain Roast', category: 'Beverages' },
    { id: 2, name: 'Premium Green Tea', sku: 'TEA-002', price: 15.50, stock: 30, brand: 'Tea Masters', category: 'Beverages' },
    { id: 3, name: 'Lavender Handmade Soap', sku: 'SOAP-003', price: 8.99, stock: 60, brand: 'Natural Bliss', category: 'Personal Care' },
    { id: 4, name: 'Pure Organic Honey', sku: 'HON-004', price: 12.75, stock: 25, brand: 'Pure Nature', category: 'Food' },
    { id: 5, name: 'Bamboo Toothbrush Set', sku: 'BRU-005', price: 5.99, stock: 0, brand: 'Eco Living', category: 'Personal Care' },
    { id: 6, name: 'Stainless Water Bottle', sku: 'BOT-006', price: 22.00, stock: 18, brand: 'Eco Living', category: 'Accessories' },
    { id: 7, name: 'Organic Coconut Oil', sku: 'COC-007', price: 18.50, stock: 35, brand: 'Pure Nature', category: 'Food' },
    { id: 8, name: 'Bamboo Cutting Board', sku: 'CUT-008', price: 29.99, stock: 12, brand: 'Eco Living', category: 'Kitchen' },
    { id: 9, name: 'Natural Lip Balm Set', sku: 'LIP-009', price: 4.50, stock: 85, brand: 'Natural Bliss', category: 'Personal Care' },
    { id: 10, name: 'Organic Quinoa 1kg', sku: 'QUI-010', price: 9.99, stock: 0, brand: 'Pure Nature', category: 'Food' },
    { id: 11, name: 'Essential Oil Starter Set', sku: 'ESS-011', price: 34.99, stock: 8, brand: 'Aroma Bliss', category: 'Wellness' },
    { id: 12, name: 'Soy Wax Candle', sku: 'CAN-012', price: 19.99, stock: 0, brand: 'Aroma Bliss', category: 'Home' }
];

// ============================================================
// 3. DOM REFERENCES
// ============================================================
const statusEl = document.getElementById('status');
const statsEl = document.getElementById('stats');
const productsEl = document.getElementById('products');
const debugEl = document.getElementById('debugLog');
const statusBadge = document.getElementById('statusBadge');
const productCountEl = document.getElementById('productCount');
const tokenDisplay = document.getElementById('tokenDisplay');
const endpointDisplay = document.getElementById('endpointDisplay');

// ============================================================
// 4. DEBUG LOGGER
// ============================================================
function debug(message, type = 'info') {
    const time = new Date().toLocaleTimeString();
    const colors = { info: 'info', success: 'success', error: 'error', warning: 'warning', data: 'data' };
    const className = colors[type] || 'info';
    debugEl.innerHTML += `<div><span class="time">[${time}]</span> <span class="${className}">${message}</span></div>`;
    debugEl.scrollTop = debugEl.scrollHeight;
    console.log(`[${time}] ${message}`);
}

function clearDebug() {
    debugEl.innerHTML = '[System] Log cleared';
    debug('Log cleared', 'info');
}

// ============================================================
// 5. SWITCH ENDPOINT
// ============================================================
function switchEndpoint() {
    CONFIG.currentEndpoint = (CONFIG.currentEndpoint + 1) % CONFIG.endpoints.length;
    const ep = CONFIG.endpoints[CONFIG.currentEndpoint];
    endpointDisplay.textContent = `Endpoint: ${ep.name}`;
    debug(`🔀 Switched to: ${ep.name} (${ep.url})`, 'info');
    loadProducts();
}

// ============================================================
// 6. LOAD MOCK DATA (Fallback)
// ============================================================
function loadMockData() {
    debug('📦 Loading mock data...', 'info');
    displayProducts(MOCK_PRODUCTS, 'Mock Data');
    statusBadge.textContent = 'Mock Data';
    statusBadge.className = 'badge warning';
    endpointDisplay.textContent = 'Using: Mock Data';
}

// ============================================================
// 7. DISPLAY PRODUCTS
// ============================================================
function displayProducts(products, source = 'Ewity API') {
    if (!products || products.length === 0) {
        productsEl.innerHTML = `
            <div class="empty-state">
                <div class="icon">🔍</div>
                <p>No products found.</p>
            </div>
        `;
        return;
    }

    // Calculate stats
    const total = products.length;
    const inStock = products.filter(p => (p.count || p.stock || 0) > 0).length;
    const outOfStock = total - inStock;
    const lowStock = products.filter(p => (p.count || p.stock || 0) > 0 && (p.count || p.stock || 0) <= 10).length;
    const totalPrice = products.reduce((sum, p) => sum + (p.default_sales_price_with_tax || p.price || 0), 0);
    const avgPrice = total > 0 ? totalPrice / total : 0;

    statsEl.innerHTML = `
        <div class="stat-box">
            <div class="number">${total}</div>
            <div class="label">Total Products</div>
        </div>
        <div class="stat-box">
            <div class="number green">${inStock}</div>
            <div class="label">In Stock</div>
        </div>
        <div class="stat-box">
            <div class="number red">${outOfStock}</div>
            <div class="label">Out of Stock</div>
        </div>
        <div class="stat-box">
            <div class="number orange">${lowStock}</div>
            <div class="label">Low Stock (≤10)</div>
        </div>
        <div class="stat-box">
            <div class="number" style="font-size:18px;">$${avgPrice.toFixed(2)}</div>
            <div class="label">Avg Price</div>
        </div>
        <div class="stat-box">
            <div class="number" style="font-size:14px;">${source}</div>
            <div class="label">Source</div>
        </div>
    `;

    statusEl.className = 'status success';
    statusEl.innerHTML = `✅ Loaded ${total} products from ${source}!`;
    statusBadge.textContent = `${total} Products`;
    statusBadge.className = 'badge success';
    productCountEl.textContent = total;

    // Render products
    productsEl.innerHTML = `
        <div class="product-grid fade-in">
            ${products.slice(0, 50).map(p => {
                const name = p.name || 'Unnamed Product';
                const sku = p.variants?.[0]?.sku || p.sku || p.code || 'N/A';
                const price = p.default_sales_price_with_tax || p.sales_price_with_tax || p.price || 0;
                const stock = p.count || p.stock || 0;
                const brand = p.brand_name || p.brand || '';
                const category = p.category_name || p.category || '';
                const hasVariants = p.has_variants || false;

                let stockClass = 'out-of-stock';
                let stockText = 'Out of Stock';
                if (stock > 20) { stockClass = 'in-stock'; stockText = 'In Stock'; }
                else if (stock > 0 && stock <= 10) { stockClass = 'low-stock'; stockText = `⚠️ ${stock} left`; }
                else if (stock > 0) { stockClass = 'in-stock'; stockText = `${stock} left`; }

                return `
                    <div class="product-card">
                        <h3>${name}</h3>
                        <span class="sku">SKU: ${sku}</span>
                        ${brand ? `<div class="brand">🏷️ ${brand}</div>` : ''}
                        ${category ? `<div class="category">📂 ${category}</div>` : ''}
                        <div class="price">$${Number(price).toFixed(2)}</div>
                        <span class="stock ${stockClass}">${stockText}</span>
                        ${hasVariants ? '<span class="variant-badge">⚡ Has variants</span>' : ''}
                        <div class="meta">
                            <span>ID: ${p.id || 'N/A'}</span>
                            <span>${p.is_inventory_tracked !== undefined ? (p.is_inventory_tracked ? '📊 Tracked' : '📊 Not tracked') : ''}</span>
                        </div>
                    </div>
                `;
            }).join('')}
        </div>
        ${products.length > 50 ? `<p style="text-align:center;margin-top:20px;color:#999;font-size:13px;">Showing 50 of ${products.length} products</p>` : ''}
    `;
}

// ============================================================
// 8. LOAD PRODUCTS - MAIN FUNCTION
// ============================================================
async function loadProducts() {
    statusEl.className = 'status loading';
    statusEl.innerHTML = `<span class="spinner"></span> Loading products from Ewity API...`;
    statusBadge.textContent = 'Loading...';
    statusBadge.className = 'badge loading';
    productCountEl.textContent = '...';

    productsEl.innerHTML = `
        <div class="empty-state">
            <div class="icon">⏳</div>
            <p>Fetching products from Ewity API...</p>
        </div>
    `;
    statsEl.innerHTML = '';

    const ep = CONFIG.endpoints[CONFIG.currentEndpoint];
    const fullUrl = `${CONFIG.baseUrl}${ep.url}`;
    endpointDisplay.textContent = `Endpoint: ${ep.name}`;

    try {
        debug('🚀 Starting product load...', 'info');
        debug(`📌 Token: ${CONFIG.token.substring(0, 20)}...`, 'info');
        debug(`📡 Fetching: ${fullUrl}`, 'info');

        const response = await fetch(fullUrl, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${CONFIG.token}`,
                'X-Ewity-Platform': CONFIG.platform,
                'x-client': 'Web',
                'x-pos-client-id': CONFIG.clientId,
                'Accept': 'application/json'
            }
        });

        debug(`📊 Status: ${response.status}`, response.ok ? 'success' : 'error');

        if (!response.ok) {
            const text = await response.text();
            let errorMsg = `HTTP ${response.status}`;
            try {
                const json = JSON.parse(text);
                errorMsg = json.message || json.error || errorMsg;
            } catch {
                errorMsg = text || errorMsg;
            }
            throw new Error(`${errorMsg} (${response.status})`);
        }

        const data = await response.json();
        const products = data.data || data.products || data.items || [];

        debug(`📊 Received ${products.length} products`, 'data');

        if (products.length === 0) {
            statusEl.className = 'status warning';
            statusEl.innerHTML = `⚠️ No products found in this endpoint`;
            statusBadge.textContent = 'No Products';
            statusBadge.className = 'badge warning';
            productsEl.innerHTML = `
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    <p>No products found. Try switching endpoint or loading mock data.</p>
                </div>
            `;
            return;
        }

        displayProducts(products, 'Ewity API');
        debug(`✅ Successfully loaded ${products.length} products`, 'success');

    } catch (error) {
        debug(`❌ Error: ${error.message}`, 'error');

        statusEl.className = 'status error';
        statusEl.innerHTML = `❌ Error: ${error.message}`;
        statusBadge.textContent = 'Error';
        statusBadge.className = 'badge error';

        productsEl.innerHTML = `
            <div class="error-container fade-in">
                <h3>❌ Failed to Load Products</h3>
                <p><strong>Error:</strong> ${error.message}</p>
                <p><strong>Possible reasons:</strong></p>
                <ul>
                    <li>The token may not have <strong>"Read Product"</strong> permission</li>
                    <li>The token may be for a different API (try the E-commerce API)</li>
                    <li>The API endpoint may not exist or require different headers</li>
                    <li>Your token may be expired or invalid</li>
                </ul>
                <p><strong>Solutions:</strong></p>
                <ul>
                    <li>✅ Click <strong>"Switch Endpoint"</strong> to try a different API endpoint</li>
                    <li>✅ Click <strong>"Load Mock Data"</strong> to see the UI with sample products</li>
                    <li>✅ Check the <strong>"Manage Levels"</strong> permission for this API user</li>
                </ul>
                <details>
                    <summary>🔍 Debug Information</summary>
                    <pre>
Token: ${CONFIG.token}
Endpoint: ${fullUrl}
Platform: ${CONFIG.platform}
Client ID: ${CONFIG.clientId}
Error: ${error.stack || error.message}
                    </pre>
                </details>
                <div style="margin-top:15px;display:flex;gap:10px;flex-wrap:wrap;">
                    <button onclick="loadProducts()" style="padding:12px 24px;background:#1a237e;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;">
                        🔄 Try Again
                    </button>
                    <button onclick="loadMockData()" style="padding:12px 24px;background:#2e7d32;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;">
                        📦 Load Mock Data
                    </button>
                </div>
            </div>
        `;
        statsEl.innerHTML = '';
    }
}

// ============================================================
// 9. TRY ECOMMERCE API (Alternative)
// ============================================================
async function tryEcommerceAPI() {
    const ecomUrl = 'https://app.ewitypos.com/api/ecom-v1/users/me';
    debug('🔄 Trying E-commerce API...', 'info');
    try {
        const response = await fetch(ecomUrl, {
            headers: {
                'Authorization': `Bearer ${CONFIG.token}`,
                'X-Ewity-Platform': 'web'
            }
        });
        if (response.ok) {
            const data = await response.json();
            debug('✅ E-commerce API works!', 'success');
            debug(`📊 User: ${data.data?.name || 'Unknown'}`, 'data');
            return true;
        } else {
            debug(`❌ E-commerce API failed: ${response.status}`, 'error');
            return false;
        }
    } catch (e) {
        debug(`❌ E-commerce API error: ${e.message}`, 'error');
        return false;
    }
}

// ============================================================
// 10. INITIALIZE
// ============================================================
async function init() {
    tokenDisplay.textContent = CONFIG.token;
    endpointDisplay.textContent = `Endpoint: ${CONFIG.endpoints[0].name}`;
    
    debug('🚀 Page loaded', 'info');
    debug(`📌 Token: ${CONFIG.token.substring(0, 20)}...`, 'info');
    debug(`📌 Platform: ${CONFIG.platform}`, 'info');
    debug(`📌 Client ID: ${CONFIG.clientId}`, 'info');
    debug('📌 Loading products from Ewity API...', 'info');

    // Try to load products
    await loadProducts();

    // If failed, try the E-commerce API
    const statusText = statusEl.textContent;
    if (statusText.includes('Error') || statusText.includes('failed')) {
        debug('💡 Trying E-commerce API as fallback...', 'info');
        const ecomWorks = await tryEcommerceAPI();
        if (ecomWorks) {
            debug('💡 Your token works for E-commerce API!', 'success');
            debug('💡 Try using /api/ecom-v1/products endpoint', 'info');
        }
    }
}

// ============================================================
// 11. EXPOSE FUNCTIONS
// ============================================================
window.loadProducts = loadProducts;
window.clearDebug = clearDebug;
window.switchEndpoint = switchEndpoint;
window.loadMockData = loadMockData;
window.tryEcommerceAPI = tryEcommerceAPI;

// ============================================================
// 12. START
// ============================================================
document.addEventListener('DOMContentLoaded', init);
</script>

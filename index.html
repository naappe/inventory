<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🛍️ Ewity Products</title>
    <style>
        /* ----------------------------------------------
           RESET & BASE
        ------------------------------------------------ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        /* ----------------------------------------------
           HEADER
        ------------------------------------------------ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .header h1 {
            font-size: 28px;
            color: #1a237e;
        }
        .badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .badge.success { background: #e8f5e9; color: #2e7d32; }
        .badge.error { background: #ffebee; color: #c62828; }
        .badge.warning { background: #fff3e0; color: #e65100; }
        .badge.loading { background: #e3f2fd; color: #0d47a1; }
        .badge.info { background: #e3f2fd; color: #0d47a1; }
        .product-count {
            font-size: 14px;
            color: #777;
        }

        /* ----------------------------------------------
           INFO BOX
        ------------------------------------------------ */
        .info-box {
            background: #e8f5e9;
            padding: 16px 20px;
            border-radius: 10px;
            margin: 12px 0 16px;
            border-left: 4px solid #2e7d32;
            font-size: 14px;
            line-height: 1.6;
        }
        .info-box.error {
            background: #ffebee;
            border-left-color: #c62828;
        }
        .info-box code {
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            word-break: break-all;
        }

        /* ----------------------------------------------
           STATUS
        ------------------------------------------------ */
        .status {
            padding: 15px 20px;
            margin: 12px 0 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status.loading {
            background: #e3f2fd;
            color: #0d47a1;
            border-left: 4px solid #1976d2;
        }
        .status.success {
            background: #e8f5e9;
            color: #1b5e20;
            border-left: 4px solid #43a047;
        }
        .status.error {
            background: #ffebee;
            color: #b71c1c;
            border-left: 4px solid #e53935;
        }
        .status.warning {
            background: #fff3e0;
            color: #e65100;
            border-left: 4px solid #fb8c00;
        }
        .status .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e3f2fd;
            border-top: 3px solid #1976d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ----------------------------------------------
           STATS
        ------------------------------------------------ */
        .stats {
            display: flex;
            gap: 12px;
            margin: 12px 0 18px;
            flex-wrap: wrap;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 10px 22px;
            border-radius: 10px;
            border: 1px solid #e9ecef;
            min-width: 90px;
        }
        .stat-box .number {
            font-size: 24px;
            font-weight: 700;
            color: #1a237e;
        }
        .stat-box .number.green { color: #2e7d32; }
        .stat-box .number.red { color: #c62828; }
        .stat-box .number.orange { color: #e65100; }
        .stat-box .label {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        /* ----------------------------------------------
           CONTROLS
        ------------------------------------------------ */
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0 18px;
        }
        .controls button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .controls button.primary {
            background: #1a237e;
            color: #fff;
        }
        .controls button.primary:hover {
            background: #0d1445;
            transform: translateY(-1px);
        }
        .controls button.success-btn {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .controls button.success-btn:hover {
            background: #c8e6c9;
        }
        .controls button.danger {
            background: #ffebee;
            color: #c62828;
        }
        .controls button.danger:hover {
            background: #ffcdd2;
        }
        .controls button.info-btn {
            background: #e3f2fd;
            color: #0d47a1;
        }
        .controls button.info-btn:hover {
            background: #bbdefb;
        }

        /* ----------------------------------------------
           PRODUCT GRID
        ------------------------------------------------ */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 20px;
            margin-top: 16px;
        }
        .product-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 18px;
            transition: all 0.2s;
        }
        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            border-color: #1a237e;
        }
        .product-card h3 {
            font-size: 16px;
            color: #1a237e;
            margin-bottom: 6px;
        }
        .product-card .sku {
            font-size: 12px;
            color: #999;
            background: #f5f5f5;
            padding: 2px 10px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 6px;
        }
        .product-card .brand {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        .product-card .category {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }
        .product-card .price {
            font-size: 22px;
            font-weight: 700;
            color: #1a237e;
            margin: 6px 0;
        }
        .product-card .stock {
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
            font-weight: 600;
        }
        .product-card .stock.in-stock {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .product-card .stock.low-stock {
            background: #fff3e0;
            color: #e65100;
        }
        .product-card .stock.out-of-stock {
            background: #ffebee;
            color: #c62828;
        }
        .product-card .meta {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
        }

        /* ----------------------------------------------
           EMPTY / ERROR
        ------------------------------------------------ */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .error-box {
            background: #ffebee;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #c62828;
            margin: 16px 0;
        }
        .error-box h3 {
            color: #c62828;
            margin-bottom: 8px;
        }
        .error-box ul {
            margin: 8px 0 8px 20px;
            color: #555;
        }
        .error-box details {
            margin-top: 12px;
        }
        .error-box details summary {
            cursor: pointer;
            color: #1a237e;
            font-weight: 600;
        }
        .error-box pre {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            overflow: auto;
            font-size: 12px;
            margin-top: 8px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* ----------------------------------------------
           DEBUG
        ------------------------------------------------ */
        .debug-section {
            margin-top: 25px;
        }
        .debug-section .debug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .debug-section .debug-header h3 {
            font-size: 14px;
            color: #333;
        }
        .debug-section .debug-header small {
            font-size: 12px;
            color: #999;
        }
        .debug-log {
            background: #1a1a2e;
            color: #aed581;
            padding: 14px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 350px;
            overflow: auto;
            white-space: pre-wrap;
            line-height: 1.7;
        }
        .debug-log .time { color: #78909c; }
        .debug-log .info { color: #4fc3f7; }
        .debug-log .success { color: #81c784; }
        .debug-log .error { color: #ef5350; }
        .debug-log .warning { color: #ffb74d; }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .container { padding: 16px; }
            .product-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 22px; }
            .stats { gap: 8px; }
            .stat-box { padding: 8px 14px; }
            .stat-box .number { font-size: 18px; }
            .controls button { padding: 8px 14px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ======== HEADER ======== -->
    <div class="header">
        <div>
            <h1>🛍️ Ewity Products</h1>
            <span class="badge loading" id="statusBadge">Loading...</span>
        </div>
        <div class="product-count">
            <span id="productCount">0</span> products
        </div>
    </div>

    <!-- ======== INFO BOX ======== -->
    <div class="info-box" id="infoBox">
        <strong>🔑 Token:</strong> <code id="tokenDisplay">Loading...</code>
        <br />
        <strong>📌 Status:</strong> <span id="statusMessage">Loading products...</span>
        <br />
        <strong>🌐 Proxy:</strong> <code>api.allorigins.win</code> (bypasses CORS)
    </div>

    <!-- ======== STATUS ======== -->
    <div id="status" class="status loading">
        <span class="spinner"></span>
        Loading products...
    </div>

    <!-- ======== STATS ======== -->
    <div id="stats" class="stats"></div>

    <!-- ======== CONTROLS ======== -->
    <div class="controls">
        <button class="primary" onclick="fetchProducts()">🔄 Fetch Products</button>
        <button class="success-btn" onclick="loadMockData()">📦 Mock Data</button>
        <button class="info-btn" onclick="tryDirect()">🔗 Try Direct</button>
        <button class="danger" onclick="clearDebug()">🗑️ Clear Log</button>
    </div>

    <!-- ======== PRODUCTS ======== -->
    <div id="products">
        <div class="empty-state">
            <div class="icon">⏳</div>
            <p>Loading products from Ewity API via CORS proxy...</p>
        </div>
    </div>

    <!-- ======== DEBUG LOG ======== -->
    <div class="debug-section">
        <div class="debug-header">
            <h3>📋 Debug Log</h3>
            <small id="endpointDisplay">Auto-loading...</small>
        </div>
        <div class="debug-log" id="debugLog">[System] Initializing...</div>
    </div>
</div>

<script>
    // ============================================================
    //  CONFIGURATION
    // ============================================================
    const CONFIG = {
        // ⚠️ REPLACE WITH YOUR TOKEN
        token: 'uat_hMwqvHc8F8VxlUPT0aBPsPy9uijb',
        proxy: 'https://api.allorigins.win/raw?url=',
        endpoints: [
            'https://app.ewitypos.com/api/ecom-v1/products',
            'https://app.ewitypos.com/api/ecom-v1/locations',
            'https://api.ewity.com/products'
        ],
        platform: 'web'
    };

    // ============================================================
    //  MOCK DATA (Your actual products)
    // ============================================================
    const MOCK_PRODUCTS = [
        { id: 1, name: 'Ice cream soda', sku: 'ICS-001', price: 25.00, stock: 24, brand: '', category: 'Beverages' },
        { id: 2, name: 'Beef Sandwich', sku: 'BFS-002', price: 55.00, stock: -1, brand: '', category: 'Food' },
        { id: 3, name: 'Pepsi', sku: 'PEP-003', price: 25.00, stock: 23, brand: 'Pepsi', category: 'Beverages' },
        { id: 4, name: '7up', sku: 'SEV-004', price: 25.00, stock: 22, brand: '7up', category: 'Beverages' },
        { id: 5, name: 'Cappuccino', sku: 'CAP-005', price: 55.00, stock: -2, brand: '', category: 'Beverages' },
        { id: 6, name: 'Beef noodle soup', sku: 'BNS-006', price: 50.00, stock: -1, brand: '', category: 'Food' },
        { id: 7, name: 'Grill tuna (single)', sku: 'GTU-007', price: 45.00, stock: 0, brand: '', category: 'Food' },
        { id: 8, name: 'Chicken hot spicy burger', sku: 'CHB-008', price: 75.00, stock: 0, brand: '', category: 'Food' },
        { id: 9, name: 'Pesto pasta', sku: 'PES-009', price: 80.00, stock: 0, brand: '', category: 'Food' }
    ];

    // ============================================================
    //  DOM REFS
    // ============================================================
    const statusEl = document.getElementById('status');
    const statsEl = document.getElementById('stats');
    const productsEl = document.getElementById('products');
    const debugEl = document.getElementById('debugLog');
    const statusBadge = document.getElementById('statusBadge');
    const productCountEl = document.getElementById('productCount');
    const tokenDisplay = document.getElementById('tokenDisplay');
    const statusMessage = document.getElementById('statusMessage');
    const endpointDisplay = document.getElementById('endpointDisplay');
    const infoBox = document.getElementById('infoBox');

    // ============================================================
    //  DEBUG LOGGER
    // ============================================================
    function debug(msg, type) {
        type = type || 'info';
        var time = new Date().toLocaleTimeString();
        var cls = type;
        debugEl.innerHTML += '<div><span class="time">[' + time + ']</span> <span class="' + cls + '">' + msg + '</span></div>';
        debugEl.scrollTop = debugEl.scrollHeight;
        console.log('[' + time + '] ' + msg);
    }

    function clearDebug() {
        debugEl.innerHTML = '[System] Log cleared';
        debug('Log cleared', 'info');
    }

    // ============================================================
    //  DISPLAY PRODUCTS
    // ============================================================
    function displayProducts(products, source) {
        if (!products || products.length === 0) {
            productsEl.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No products found.</p></div>';
            return;
        }

        var total = products.length;
        var inStock = 0;
        var outOfStock = 0;
        var totalPrice = 0;
        var i, p, price;

        for (i = 0; i < products.length; i++) {
            p = products[i];
            if ((p.count || p.stock || 0) > 0) inStock++;
            else outOfStock++;
            price = p.default_sales_price_with_tax || p.sales_price_with_tax || p.price || 0;
            totalPrice += price;
        }
        var avgPrice = total > 0 ? totalPrice / total : 0;

        statsEl.innerHTML = 
            '<div class="stat-box"><div class="number">' + total + '</div><div class="label">Total Products</div></div>' +
            '<div class="stat-box"><div class="number green">' + inStock + '</div><div class="label">In Stock</div></div>' +
            '<div class="stat-box"><div class="number red">' + outOfStock + '</div><div class="label">Out of Stock</div></div>' +
            '<div class="stat-box"><div class="number" style="font-size:18px;">$' + avgPrice.toFixed(2) + '</div><div class="label">Avg Price</div></div>' +
            '<div class="stat-box"><div class="number" style="font-size:14px;">' + source + '</div><div class="label">Source</div></div>';

        statusEl.className = 'status success';
        statusEl.innerHTML = '✅ Loaded ' + total + ' products from ' + source + '!';
        statusBadge.textContent = total + ' Products';
        statusBadge.className = 'badge success';
        productCountEl.textContent = total;
        statusMessage.textContent = '✅ ' + total + ' products from ' + source;
        infoBox.className = 'info-box';

        var html = '<div class="product-grid fade-in">';
        for (i = 0; i < products.length; i++) {
            p = products[i];
            var name = p.name || 'Unnamed';
            var sku = (p.variants && p.variants[0] && p.variants[0].sku) || p.sku || 'N/A';
            var price2 = p.default_sales_price_with_tax || p.sales_price_with_tax || p.price || 0;
            var stock = p.count || p.stock || 0;
            var brand = p.brand_name || p.brand || '';
            var category = p.category_name || p.category || '';

            var stockClass = 'out-of-stock';
            var stockText = 'Out of Stock';
            if (stock > 20) { stockClass = 'in-stock'; stockText = 'In Stock'; }
            else if (stock > 0 && stock <= 5) { stockClass = 'low-stock'; stockText = '⚠️ ' + stock + ' left'; }
            else if (stock > 0) { stockClass = 'in-stock'; stockText = stock + ' left'; }
            else if (stock < 0) { stockClass = 'out-of-stock'; stockText = Math.abs(stock) + ' sold'; }

            html += '<div class="product-card">' +
                '<h3>' + name + '</h3>' +
                '<span class="sku">SKU: ' + sku + '</span>' +
                (brand ? '<div class="brand">🏷️ ' + brand + '</div>' : '') +
                (category ? '<div class="category">📂 ' + category + '</div>' : '') +
                '<div class="price">$' + Number(price2).toFixed(2) + '</div>' +
                '<span class="stock ' + stockClass + '">' + stockText + '</span>' +
                '<div class="meta"><span>ID: ' + (p.id || 'N/A') + '</span></div>' +
                '</div>';
        }
        html += '</div>';
        productsEl.innerHTML = html;
    }

    // ============================================================
    //  LOAD MOCK DATA
    // ============================================================
    function loadMockData() {
        debug('📦 Loading mock data...', 'info');
        displayProducts(MOCK_PRODUCTS, 'Mock Data');
        endpointDisplay.textContent = 'Using Mock Data';
        infoBox.className = 'info-box';
    }

    // ============================================================
    //  FETCH PRODUCTS (via CORS Proxy)
    // ============================================================
    async function fetchProducts() {
        statusEl.className = 'status loading';
        statusEl.innerHTML = '<span class="spinner"></span> Fetching via CORS proxy...';
        statusBadge.textContent = 'Fetching...';
        statusBadge.className = 'badge loading';
        statusMessage.textContent = '🔄 Fetching via proxy...';
        endpointDisplay.textContent = 'Using CORS proxy...';

        productsEl.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Fetching via CORS proxy...</p></div>';
        statsEl.innerHTML = '';

        var foundProducts = null;
        var workingEndpoint = '';
        var i, url, proxyUrl, response, data, products;

        for (i = 0; i < CONFIG.endpoints.length; i++) {
            url = CONFIG.endpoints[i];
            try {
                proxyUrl = CONFIG.proxy + encodeURIComponent(url);
                debug('🌐 Fetching via proxy: ' + proxyUrl, 'info');

                response = await fetch(proxyUrl, {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + CONFIG.token,
                        'X-Ewity-Platform': CONFIG.platform,
                        'Accept': 'application/json'
                    }
                });

                debug('📊 ' + url + ' → Status: ' + response.status, response.ok ? 'success' : 'error');

                if (response.ok) {
                    data = await response.json();
                    products = data.data || data.products || data.items || [];
                    if (products.length > 0) {
                        foundProducts = products;
                        workingEndpoint = url;
                        debug('✅ Found ' + products.length + ' products at ' + url, 'success');
                        break;
                    }
                }
            } catch (e) {
                debug('❌ ' + url + ' failed: ' + e.message, 'error');
            }
        }

        if (foundProducts && foundProducts.length > 0) {
            displayProducts(foundProducts, 'Ewity API (' + workingEndpoint + ')');
            endpointDisplay.textContent = '✅ Working: ' + workingEndpoint;
            infoBox.className = 'info-box';
        } else {
            debug('❌ All endpoints failed. Loading mock data...', 'error');
            statusEl.className = 'status error';
            statusEl.innerHTML = '❌ All endpoints failed. Loading mock data...';
            statusMessage.textContent = '❌ All endpoints failed - showing mock data';
            infoBox.className = 'info-box error';
            loadMockData();
        }
    }

    // ============================================================
    //  TRY DIRECT (without proxy - likely fails due to CORS)
    // ============================================================
    async function tryDirect() {
        debug('🔗 Trying direct API (no proxy)...', 'warning');
        statusEl.className = 'status loading';
        statusEl.innerHTML = '<span class="spinner"></span> Trying direct API...';
        statusMessage.textContent = '🔄 Trying direct...';

        var url = CONFIG.endpoints[0];
        try {
            var response = await fetch(url, {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + CONFIG.token,
                    'X-Ewity-Platform': CONFIG.platform,
                    'Accept': 'application/json'
                }
            });

            if (response.ok) {
                var data = await response.json();
                var products = data.data || data.products || data.items || [];
                if (products.length > 0) {
                    displayProducts(products, 'Ewity API (Direct)');
                    debug('✅ Direct API worked! Got ' + products.length + ' products', 'success');
                    return;
                }
            }
            debug('❌ Direct API failed: ' + response.status, 'error');
            statusEl.className = 'status error';
            statusEl.innerHTML = '❌ Direct API failed: ' + response.status;
            statusMessage.textContent = '❌ Direct API failed';
        } catch (e) {
            debug('❌ Direct API error: ' + e.message, 'error');
            statusEl.className = 'status error';
            statusEl.innerHTML = '❌ Direct API error: ' + e.message;
            statusMessage.textContent = '❌ ' + e.message;
        }
        // Fallback to mock data after 2 seconds
        setTimeout(function() {
            debug('🔄 Falling back to mock data...', 'warning');
            loadMockData();
        }, 2000);
    }

    // ============================================================
    //  INIT
    // ============================================================
    function init() {
        tokenDisplay.textContent = CONFIG.token;
        debug('🚀 Page loaded - auto-fetching products via CORS proxy...', 'info');
        debug('📌 Token: ' + CONFIG.token.substring(0, 20) + '...', 'info');
        debug('📌 Proxy: ' + CONFIG.proxy, 'info');
        debug('📌 Trying ' + CONFIG.endpoints.length + ' endpoints...', 'info');
        statusMessage.textContent = 'Auto-fetching via proxy...';
        endpointDisplay.textContent = 'Auto-loading with proxy...';
        fetchProducts();
    }

    // ============================================================
    //  EXPOSE
    // ============================================================
    window.fetchProducts = fetchProducts;
    window.loadMockData = loadMockData;
    window.clearDebug = clearDebug;
    window.tryDirect = tryDirect;

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
